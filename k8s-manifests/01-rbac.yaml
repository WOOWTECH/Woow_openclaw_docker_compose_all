apiVersion: v1
kind: ServiceAccount
metadata:
  name: wizard-sa
  namespace: openclaw-tenant-1
  labels:
    app.kubernetes.io/component: setup-wizard
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wizard-role
  namespace: openclaw-tenant-1
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "get", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "get"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wizard-rolebinding
  namespace: openclaw-tenant-1
subjects:
  - kind: ServiceAccount
    name: wizard-sa
    namespace: openclaw-tenant-1
roleRef:
  kind: Role
  name: wizard-role
  apiGroup: rbac.authorization.k8s.io
