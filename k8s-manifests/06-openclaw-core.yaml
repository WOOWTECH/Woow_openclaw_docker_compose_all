# =============================================================
# PostgreSQL (pgvector) - PersistentVolumeClaim
# =============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-db-pvc
  namespace: openclaw-tenant-1
  labels:
    app: openclaw-db
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# =============================================================
# PostgreSQL (pgvector) - ConfigMap for init script
# =============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: openclaw-tenant-1
data:
  init-pgvector.sql: |
    CREATE EXTENSION IF NOT EXISTS vector;
---
# =============================================================
# PostgreSQL (pgvector) - Deployment
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-db
  namespace: openclaw-tenant-1
  labels:
    app: openclaw-db
    app.kubernetes.io/component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openclaw-db
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "openclaw"
            - name: POSTGRES_USER
              value: "openclaw"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - openclaw
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - openclaw
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: openclaw-db-pvc
        - name: postgres-init-scripts
          configMap:
            name: postgres-init
---
# =============================================================
# PostgreSQL - Service
# =============================================================
apiVersion: v1
kind: Service
metadata:
  name: openclaw-db-svc
  namespace: openclaw-tenant-1
  labels:
    app: openclaw-db
spec:
  selector:
    app: openclaw-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP
---
# =============================================================
# OpenClaw Gateway - Deployment
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-gateway
  namespace: openclaw-tenant-1
  labels:
    app: openclaw-gateway
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw-gateway
  template:
    metadata:
      labels:
        app: openclaw-gateway
    spec:
      containers:
        - name: openclaw-gateway
          image: ghcr.io/openclaw/openclaw:latest
          command:
            - sh
            - -c
            - |
              # Write full config directly (faster than multiple config set calls)
              mkdir -p /home/node/.openclaw
              cat > /home/node/.openclaw/openclaw.json << 'CFGEOF'
              {"agents":{"defaults":{"model":"openai/gpt-4o"}},"gateway":{"mode":"local","controlUi":{"dangerouslyAllowHostHeaderOriginFallback":true},"remote":{"password":"PLACEHOLDER"},"trustedProxies":["10.42.0.0/16"]},"channels":{"telegram":{"enabled":true},"whatsapp":{"enabled":true},"line":{"enabled":true,"dmPolicy":"open","groupPolicy":"open","allowFrom":["*"]}},"commands":{"native":"auto","nativeSkills":"auto","restart":true,"ownerDisplay":"raw"}}
              CFGEOF
              sed -i "s/PLACEHOLDER/$OPENCLAW_GATEWAY_TOKEN/" /home/node/.openclaw/openclaw.json
              # Inject LINE channel credentials from env vars into config
              if [ -n "${LINE_CHANNEL_TOKEN:-}" ]; then
                node -e "
                  const fs=require('fs'),p='/home/node/.openclaw/openclaw.json';
                  const c=JSON.parse(fs.readFileSync(p,'utf8'));
                  c.channels.line.channelAccessToken=process.env.LINE_CHANNEL_TOKEN;
                  if(process.env.LINE_CHANNEL_SECRET) c.channels.line.channelSecret=process.env.LINE_CHANNEL_SECRET;
                  fs.writeFileSync(p,JSON.stringify(c,null,2));
                "
                echo '[init] LINE channel credentials injected from env'
              fi
              # Write auth-profiles.json from env vars (survives pod restart)
              mkdir -p /home/node/.openclaw/agents/main/agent
              AUTH='{}'
              [ -n "${OPENAI_API_KEY:-}" ] && AUTH=$(echo "$AUTH" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const o=JSON.parse(d);o.openai={apiKey:process.env.OPENAI_API_KEY};console.log(JSON.stringify(o))})")
              [ -n "${ANTHROPIC_API_KEY:-}" ] && AUTH=$(echo "$AUTH" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const o=JSON.parse(d);o.anthropic={apiKey:process.env.ANTHROPIC_API_KEY};console.log(JSON.stringify(o))})")
              [ -n "${GEMINI_API_KEY:-}" ] && AUTH=$(echo "$AUTH" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const o=JSON.parse(d);o.google={apiKey:process.env.GEMINI_API_KEY};console.log(JSON.stringify(o))})")
              echo "$AUTH" > /home/node/.openclaw/agents/main/agent/auth-profiles.json
              # Bootstrap all core workspace files (only if empty or missing)
              mkdir -p /home/node/.openclaw/workspace
              [ -s /home/node/.openclaw/workspace/MEMORY.md ] || printf '# Agent Memory\n\nPersistent knowledge across conversations.\n\n## System Info\n- Platform: OpenClaw K3s PaaS\n- Deployment: Woowtech Smart Space Solution\n' > /home/node/.openclaw/workspace/MEMORY.md
              [ -s /home/node/.openclaw/workspace/SOUL.md ] || printf '# Soul\n\nYou are an AI assistant on Woowtech Smart Space platform.\nRespond in the same language the user uses. Default to Traditional Chinese.\nBe helpful, professional, and concise.\n' > /home/node/.openclaw/workspace/SOUL.md
              [ -s /home/node/.openclaw/workspace/IDENTITY.md ] || printf '# Identity\n\nName: Woowtech AI Assistant\nRole: Smart space AI assistant powered by OpenClaw\nChannels: LINE, Telegram, WhatsApp, Web\n' > /home/node/.openclaw/workspace/IDENTITY.md
              [ -s /home/node/.openclaw/workspace/USER.md ] || printf '# User Preferences\n\nLanguage: Traditional Chinese (zh-TW)\nStyle: Concise and professional\n' > /home/node/.openclaw/workspace/USER.md
              [ -s /home/node/.openclaw/workspace/TOOLS.md ] || printf '# Tools\n\nAvailable: web_fetch, file_read, file_write, cron, message\n' > /home/node/.openclaw/workspace/TOOLS.md
              [ -s /home/node/.openclaw/workspace/AGENTS.md ] || printf '# Agents\n\nDefault model: openai/gpt-4o\nMode: Local gateway\n' > /home/node/.openclaw/workspace/AGENTS.md
              [ -s /home/node/.openclaw/workspace/HEARTBEAT.md ] || printf '# Heartbeat\n\nInterval: 30m\nMonitor: channel status, error rate\n' > /home/node/.openclaw/workspace/HEARTBEAT.md
              [ -s /home/node/.openclaw/workspace/BOOTSTRAP.md ] || printf '# Bootstrap\n\nOn first run: verify API key, check channels, confirm cron jobs.\n' > /home/node/.openclaw/workspace/BOOTSTRAP.md
              echo '[init] Core workspace files bootstrapped'
              rm -rf /home/node/.openclaw/devices/ 2>/dev/null || true
              # Auto-approve pending devices every 3 seconds in background
              (sleep 15; while true; do
                openclaw devices list 2>/dev/null | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | while read req; do
                  openclaw devices approve "$req" 2>/dev/null && echo "[auto-approve] approved $req"
                done
                sleep 3
              done) &
              exec openclaw gateway --bind lan --port 18789 --auth token --token "$OPENCLAW_GATEWAY_TOKEN" --allow-unconfigured
          ports:
            - containerPort: 18789
          env:
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://openclaw:$(POSTGRES_PASSWORD)@openclaw-db-svc:5432/openclaw"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: GEMINI_API_KEY
                  optional: true
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: TELEGRAM_BOT_TOKEN
                  optional: true
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: DISCORD_BOT_TOKEN
                  optional: true
            - name: LINE_CHANNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: LINE_CHANNEL_TOKEN
                  optional: true
            - name: LINE_CHANNEL_SECRET
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: LINE_CHANNEL_SECRET
                  optional: true
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          readinessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 10
---
# =============================================================
# OpenClaw Gateway - Service
# =============================================================
apiVersion: v1
kind: Service
metadata:
  name: openclaw-gateway-svc
  namespace: openclaw-tenant-1
  labels:
    app: openclaw-gateway
spec:
  selector:
    app: openclaw-gateway
  ports:
    - protocol: TCP
      port: 18789
      targetPort: 18789
  type: ClusterIP
