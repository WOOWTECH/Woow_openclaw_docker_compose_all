# Generated by deploy.sh from cf-config.json — DO NOT commit real values
apiVersion: v1
kind: Secret
metadata:
  name: cf-secrets
  namespace: openclaw-tenant-1
  labels:
    app.kubernetes.io/part-of: openclaw-paas
type: Opaque
data:
  CF_API_TOKEN: "YOUR_CF_API_TOKEN_BASE64"
  CF_TUNNEL_TOKEN: "YOUR_CF_TUNNEL_TOKEN_BASE64"
---
# OpenClaw application secrets — populated by deploy.sh or setup-wizard
# All LLM/channel keys are optional; only OPENCLAW_GATEWAY_TOKEN and
# POSTGRES_PASSWORD are required.
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-secrets
  namespace: openclaw-tenant-1
  labels:
    app.kubernetes.io/part-of: openclaw-paas
type: Opaque
data:
  # Required
  OPENCLAW_GATEWAY_TOKEN: "YOUR_GATEWAY_TOKEN_BASE64"
  POSTGRES_PASSWORD: "YOUR_POSTGRES_PASSWORD_BASE64"
  # LLM Providers (optional — set whichever you use)
  # OPENAI_API_KEY: ""
  # ANTHROPIC_API_KEY: ""
  # GEMINI_API_KEY: ""
  # MINIMAX_API_KEY: ""
  # DEEPSEEK_API_KEY: ""
  # QWEN_API_KEY: ""
  # Channel tokens (optional)
  # TELEGRAM_BOT_TOKEN: ""
  # DISCORD_BOT_TOKEN: ""
  # LINE_CHANNEL_TOKEN: ""
  # LINE_CHANNEL_SECRET: ""
  # Nerve WebGUI Authentication (optional — only needed if deploying Nerve sidecar)
  # Generate hash: node -e "require('crypto').scrypt('YOUR_PASSWORD','nerve',64,(e,k)=>console.log(k.toString('hex')))"
  # Generate secret: openssl rand -hex 32
  # NERVE_PASSWORD_HASH: ""
  # NERVE_SESSION_SECRET: ""
