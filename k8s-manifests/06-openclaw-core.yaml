# =============================================================
# OpenClaw Agents - PersistentVolumeClaim (1Gi)
# Stores: config, agents, workspace, skills, memory (LanceDB), cron,
#         telegram state, ~/.config (GOG OAuth, Chromium)
# NOTE: Increased from 1Gi to 5Gi to accommodate LanceDB vector data
# =============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-agents-pvc
  namespace: openclaw-tenant-1
  labels:
    app: openclaw-gateway
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
# =============================================================
# PostgreSQL (pgvector) - PersistentVolumeClaim (10Gi)
# =============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-db-pvc
  namespace: openclaw-tenant-1
  labels:
    app: openclaw-db
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# =============================================================
# PostgreSQL (pgvector) - ConfigMap for init script
# =============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: openclaw-tenant-1
data:
  init-pgvector.sql: |
    CREATE EXTENSION IF NOT EXISTS vector;
---
# =============================================================
# PostgreSQL (pgvector) - Deployment
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-db
  namespace: openclaw-tenant-1
  labels:
    app: openclaw-db
    app.kubernetes.io/component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openclaw-db
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: "openclaw"
            - name: POSTGRES_USER
              value: "openclaw"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - openclaw
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - openclaw
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: openclaw-db-pvc
        - name: postgres-init-scripts
          configMap:
            name: postgres-init
---
# =============================================================
# PostgreSQL - Service
# =============================================================
apiVersion: v1
kind: Service
metadata:
  name: openclaw-db-svc
  namespace: openclaw-tenant-1
  labels:
    app: openclaw-db
spec:
  selector:
    app: openclaw-db
  ports:
    - name: postgres
      protocol: TCP
      port: 5432
      targetPort: postgres
  type: ClusterIP
---
# =============================================================
# OpenClaw Gateway - Deployment (v2.2)
#
# Image: openclaw-custom:latest (base image with Chromium, Go CLIs, etc.)
#   - OpenClaw runtime upgraded to latest via init script (npm i -g openclaw)
#   - Upgrade cached at /home/node/.local/bin/openclaw on PVC
#
# Persistence: All stateful data symlinked to /mnt/openclaw-agents PVC
# Auth profiles: Merge mode (preserves user-added keys across restarts)
# Config: First-boot only write, then preserve existing
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-gateway
  namespace: openclaw-tenant-1
  labels:
    app: openclaw-gateway
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw-gateway
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openclaw-gateway
    spec:
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      securityContext:
        fsGroup: 1000
      containers:
        - name: openclaw-gateway
          image: openclaw-custom:latest
          imagePullPolicy: Never
          command:
            - sh
            - -c
            - |
              # Setup persistent dirs — symlink all stateful dirs to PVC
              mkdir -p /home/node/.openclaw
              PVC="/mnt/openclaw-agents"
              ln -sfn "$PVC" /home/node/.openclaw/agents
              mkdir -p "$PVC/_workspace" "$PVC/_managed-skills" "$PVC/_memory" "$PVC/_cron" "$PVC/_telegram" "$PVC/_config" "$PVC/_extensions" "$PVC/_nerve"
              ln -sfn "$PVC/_workspace" /home/node/.openclaw/workspace
              ln -sfn "$PVC/_managed-skills" /home/node/.openclaw/skills
              ln -sfn "$PVC/_memory" /home/node/.openclaw/memory
              # Restore exec-approvals from PVC (security:full + ask:off = no approval prompts)
              if [ -f "$PVC/exec-approvals.json" ]; then
                cp "$PVC/exec-approvals.json" /home/node/.openclaw/exec-approvals.json
              else
                # First boot: create exec-approvals.json with full bypass
                node -e '
                  const fs = require("fs"), crypto = require("crypto");
                  const data = {
                    version: 1,
                    socket: { path: "/home/node/.openclaw/exec-approvals.sock", token: crypto.randomBytes(24).toString("base64url") },
                    defaults: { security: "full", ask: "off", askFallback: "full", autoAllowSkills: true },
                    agents: {
                      main: { security: "full", ask: "off", askFallback: "full", autoAllowSkills: true, allowlist: [{ pattern: "*", id: crypto.randomUUID() }] },
                      "*": { security: "full", ask: "off", askFallback: "full", autoAllowSkills: true, allowlist: [{ pattern: "*", id: crypto.randomUUID() }] }
                    }
                  };
                  fs.writeFileSync("/home/node/.openclaw/exec-approvals.json", JSON.stringify(data, null, 2) + "\n", { mode: 0o600 });
                  fs.copyFileSync("/home/node/.openclaw/exec-approvals.json", process.argv[1] + "/exec-approvals.json");
                  console.log("[init] Created exec-approvals.json (security:full, ask:off)");
                ' "$PVC"
              fi
              # Extensions must be a real dir (not symlink) for openclaw plugins install
              mkdir -p /home/node/.openclaw/extensions
              # Restore plugins from PVC backup if previously installed
              if [ -d "$PVC/_extensions/memory-lancedb-pro" ]; then
                cp -a "$PVC/_extensions/memory-lancedb-pro" /home/node/.openclaw/extensions/
                echo '[init] Restored memory-lancedb-pro plugin from PVC cache'
              fi
              if [ -d "$PVC/_extensions/openclaw-homeassistant" ]; then
                cp -a "$PVC/_extensions/openclaw-homeassistant" /home/node/.openclaw/extensions/
                echo '[init] Restored openclaw-homeassistant plugin from PVC cache'
              fi
              if [ -d "$PVC/_extensions/lossless-claw-enhanced" ]; then
                cp -a "$PVC/_extensions/lossless-claw-enhanced" /home/node/.openclaw/extensions/
                echo '[init] Restored lossless-claw-enhanced plugin from PVC cache'
              fi
              ln -sfn "$PVC/_cron" /home/node/.openclaw/cron
              ln -sfn "$PVC/_telegram" /home/node/.openclaw/telegram
              # Persist ~/.config (GOG OAuth, Chromium profile, etc.)
              ln -sfn "$PVC/_config" /home/node/.config
              # Persist openclaw.json on PVC — only write default on first boot
              CONFIG_PVC="/mnt/openclaw-agents/_openclaw.json"
              CONFIG="/home/node/.openclaw/openclaw.json"
              if [ ! -s "$CONFIG_PVC" ]; then
                echo '[init] First boot: writing default openclaw.json'
                cat > "$CONFIG_PVC" << 'CFGEOF'
              {"agents":{"defaults":{"model":"openai/gpt-4o","sandbox":{"browser":{"enabled":true}}}},"gateway":{"mode":"local","controlUi":{"dangerouslyAllowHostHeaderOriginFallback":true,"dangerouslyDisableDeviceAuth":true},"remote":{"password":"PLACEHOLDER"},"trustedProxies":["10.42.0.0/16"],"tools":{"allow":["cron","sessions_list","sessions_history","sessions_spawn","sessions_send","sessions_yield","session_status","memory_recall","memory_store","memory_forget","memory_update","web_fetch","web_search","read","write","edit","exec","agents_list","gateway","message","browser","canvas","image","pdf","tts","process","nodes","subagents","ha_status","ha_list_entities","ha_get_state","ha_search_entities","ha_list_services","ha_light_on","ha_light_off","ha_light_toggle","ha_light_list","ha_switch_on","ha_switch_off","ha_switch_toggle","ha_climate_set_temp","ha_climate_set_mode","ha_climate_set_preset","ha_climate_list","ha_media_play","ha_media_pause","ha_media_stop","ha_media_volume","ha_media_play_media","ha_cover_open","ha_cover_close","ha_cover_position","ha_scene_activate","ha_script_run","ha_automation_trigger","ha_sensor_list","ha_history","ha_logbook","ha_call_service","ha_fire_event","ha_render_template","ha_notify"]}},"channels":{"telegram":{"enabled":true,"dmPolicy":"open","groupPolicy":"open","streaming":"partial","allowFrom":["*"]},"whatsapp":{"enabled":true,"dmPolicy":"pairing","groupPolicy":"allowlist","debounceMs":0,"mediaMaxMb":50},"line":{"enabled":true,"dmPolicy":"open","groupPolicy":"open","allowFrom":["*"]}},"commands":{"native":"auto","nativeSkills":"auto","restart":true,"ownerDisplay":"raw"},"browser":{"noSandbox":true,"headless":true},"approvals":{"exec":{"enabled":false}},"tools":{"exec":{"security":"full","ask":"off"}}}
              CFGEOF
                sed -i "s/PLACEHOLDER/$OPENCLAW_GATEWAY_TOKEN/" "$CONFIG_PVC"
                # Auto-detect default model from available API keys
                DEFAULT_MODEL=""
                [ -n "${OPENAI_API_KEY:-}" ] && DEFAULT_MODEL="openai/gpt-4o"
                [ -z "$DEFAULT_MODEL" ] && [ -n "${MINIMAX_API_KEY:-}" ] && DEFAULT_MODEL="minimax/MiniMax-M2.7"
                [ -z "$DEFAULT_MODEL" ] && [ -n "${DEEPSEEK_API_KEY:-}" ] && DEFAULT_MODEL="deepseek/deepseek-chat"
                [ -z "$DEFAULT_MODEL" ] && [ -n "${ANTHROPIC_API_KEY:-}" ] && DEFAULT_MODEL="anthropic/claude-sonnet-4-20250514"
                [ -z "$DEFAULT_MODEL" ] && [ -n "${GEMINI_API_KEY:-}" ] && DEFAULT_MODEL="google/gemini-2.0-flash"
                [ -z "$DEFAULT_MODEL" ] && [ -n "${QWEN_API_KEY:-}" ] && DEFAULT_MODEL="qwen/qwen-max"
                [ -z "$DEFAULT_MODEL" ] && DEFAULT_MODEL="openai/gpt-4o"
                node -e "const fs=require('fs'),p='$CONFIG_PVC';const c=JSON.parse(fs.readFileSync(p,'utf8'));c.agents.defaults.model='$DEFAULT_MODEL';fs.writeFileSync(p,JSON.stringify(c,null,2))"
                echo "[init] Default model set to $DEFAULT_MODEL"
                # Inject Nerve public URL into gateway controlUi allowedOrigins
                if [ -n "${NERVE_PUBLIC_URL:-}" ]; then
                  node -e "
                    const fs=require('fs'),p='$CONFIG_PVC';
                    const c=JSON.parse(fs.readFileSync(p,'utf8'));
                    c.gateway.controlUi.allowedOrigins=[process.env.NERVE_PUBLIC_URL];
                    fs.writeFileSync(p,JSON.stringify(c,null,2));
                  "
                  echo "[init] Gateway allowedOrigins set to $NERVE_PUBLIC_URL"
                fi
                # Inject channel credentials from env vars into config
                if [ -n "${TELEGRAM_BOT_TOKEN:-}" ]; then
                  node -e "
                    const fs=require('fs'),p='$CONFIG_PVC';
                    const c=JSON.parse(fs.readFileSync(p,'utf8'));
                    c.channels.telegram.botToken=process.env.TELEGRAM_BOT_TOKEN;
                    fs.writeFileSync(p,JSON.stringify(c,null,2));
                  "
                  echo '[init] Telegram botToken injected from env'
                fi
                if [ -n "${LINE_CHANNEL_TOKEN:-}" ]; then
                  node -e "
                    const fs=require('fs'),p='$CONFIG_PVC';
                    const c=JSON.parse(fs.readFileSync(p,'utf8'));
                    c.channels.line.channelAccessToken=process.env.LINE_CHANNEL_TOKEN;
                    if(process.env.LINE_CHANNEL_SECRET) c.channels.line.channelSecret=process.env.LINE_CHANNEL_SECRET;
                    fs.writeFileSync(p,JSON.stringify(c,null,2));
                  "
                  echo '[init] LINE channel credentials injected from env'
                fi
              else
                echo '[init] Existing config found on PVC — preserving channels & settings'
                # Only update gateway token (may change via K8s secret)
                node -e "const fs=require('fs'),p='$CONFIG_PVC';const c=JSON.parse(fs.readFileSync(p,'utf8'));c.gateway.remote.password=process.env.OPENCLAW_GATEWAY_TOKEN;fs.writeFileSync(p,JSON.stringify(c,null,2))"
              fi
              # Ensure exec security=full (bypass allowlist analysis for all channels including Telegram)
              cat << 'EXECFIX' | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{eval(d)})"
                const fs=require('fs'),p='/mnt/openclaw-agents/_openclaw.json';
                const c=JSON.parse(fs.readFileSync(p,'utf8'));
                if(!c.tools) c.tools={};
                if(!c.tools.exec) c.tools.exec={};
                if(c.tools.exec.security!=='full'||c.tools.exec.ask!=='off'){
                  c.tools.exec.security='full'; c.tools.exec.ask='off';
                  fs.writeFileSync(p,JSON.stringify(c,null,2));
                  console.log('[init] Set tools.exec: security=full, ask=off');
                }
              EXECFIX
              ln -sf "$CONFIG_PVC" "$CONFIG"
              # Write auth-profiles.json: merge mode (preserve user-added keys, update env-var keys)
              mkdir -p /home/node/.openclaw/agents/main/agent
              AUTH_FILE="/home/node/.openclaw/agents/main/agent/auth-profiles.json"
              AUTH=$(cat "$AUTH_FILE" 2>/dev/null || echo '{}')
              echo "$AUTH" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{JSON.parse(d)}catch(e){process.exit(1)}})" || AUTH='{}'
              [ -n "${OPENAI_API_KEY:-}" ] && AUTH=$(echo "$AUTH" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const o=JSON.parse(d);o.openai={apiKey:process.env.OPENAI_API_KEY};console.log(JSON.stringify(o))})")
              [ -n "${ANTHROPIC_API_KEY:-}" ] && AUTH=$(echo "$AUTH" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const o=JSON.parse(d);o.anthropic={apiKey:process.env.ANTHROPIC_API_KEY};console.log(JSON.stringify(o))})")
              [ -n "${GEMINI_API_KEY:-}" ] && AUTH=$(echo "$AUTH" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const o=JSON.parse(d);o.google={apiKey:process.env.GEMINI_API_KEY};console.log(JSON.stringify(o))})")
              [ -n "${MINIMAX_API_KEY:-}" ] && AUTH=$(echo "$AUTH" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const o=JSON.parse(d);o.minimax={apiKey:process.env.MINIMAX_API_KEY};console.log(JSON.stringify(o))})")
              [ -n "${DEEPSEEK_API_KEY:-}" ] && AUTH=$(echo "$AUTH" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const o=JSON.parse(d);o.deepseek={apiKey:process.env.DEEPSEEK_API_KEY};console.log(JSON.stringify(o))})")
              [ -n "${QWEN_API_KEY:-}" ] && AUTH=$(echo "$AUTH" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const o=JSON.parse(d);o.qwen={apiKey:process.env.QWEN_API_KEY};console.log(JSON.stringify(o))})")
              echo "$AUTH" > "$AUTH_FILE"
              # Bootstrap all core workspace files (only if empty or missing, writes to PVC)
              [ -s /home/node/.openclaw/workspace/MEMORY.md ] || printf '# Agent Memory\n\nPersistent knowledge across conversations.\n\n## System Info\n- Platform: OpenClaw K3s PaaS\n- Deployment: Woowtech Smart Space Solution\n' > /home/node/.openclaw/workspace/MEMORY.md
              [ -s /home/node/.openclaw/workspace/SOUL.md ] || printf '# Soul\n\nYou are an AI assistant on Woowtech Smart Space platform.\nRespond in the same language the user uses. Default to Traditional Chinese.\nBe helpful, professional, and concise.\n\n## Important Rules\n\n### Memory-First Principle\nWhen a user asks about information they previously told you (personal info, preferences, infrastructure details, schedules, etc.), ALWAYS use the memory_recall tool FIRST to search your long-term memory before taking any other action. Do NOT attempt to run system commands (kubectl, curl, etc.) to look up information the user already told you — check memory first. Only fall back to system commands if memory_recall returns no results AND the question requires live system data.\n\n### Active Memory Storage\nWhen a user tells you ANY factual information about themselves, their company, infrastructure, preferences, or any specific data — you MUST proactively use the memory_store tool to save it IMMEDIATELY. Do NOT rely solely on autoCapture. Specifically store:\n- Personal info: names, addresses, birthdays, family members, pets\n- Professional info: job title, company, team, responsibilities\n- Technical details: server IPs, ports, credentials, configurations, version numbers\n- Precise identifiers: license plates, serial numbers, account IDs, phone numbers\n- Preferences: tools, languages, workflows, schedules\n- Business data: revenue, headcount, clients, product lines\n\nWhen updating existing facts, use memory_update to replace old values instead of creating duplicates.\n\n### Skill Environment Variables Persistence\nWhen a user configures any skill parameters (API keys, URLs, credentials) through conversation or web GUI, you MUST immediately write them to `workspace/.env` using the file_write tool. Format: KEY=value (one per line). This ensures the values survive pod restarts.\n\nExample: if user sets HA_URL=http://192.168.1.100:8123, immediately write it to workspace/.env.\nAlways append to existing content, never overwrite other variables.\n' > /home/node/.openclaw/workspace/SOUL.md
              [ -s /home/node/.openclaw/workspace/IDENTITY.md ] || printf '# Identity\n\nName: Woowtech AI Assistant\nRole: Smart space AI assistant powered by OpenClaw\nChannels: LINE, Telegram, WhatsApp, Web\n' > /home/node/.openclaw/workspace/IDENTITY.md
              [ -s /home/node/.openclaw/workspace/USER.md ] || printf '# User Preferences\n\nLanguage: Traditional Chinese (zh-TW)\nStyle: Concise and professional\n' > /home/node/.openclaw/workspace/USER.md
              [ -s /home/node/.openclaw/workspace/TOOLS.md ] || printf '# Tools\n\nAvailable: web_fetch, file_read, file_write, cron, message\n' > /home/node/.openclaw/workspace/TOOLS.md
              [ -s /home/node/.openclaw/workspace/AGENTS.md ] || printf '# Agents\n\nDefault model: openai/gpt-4o\nMode: Local gateway\n' > /home/node/.openclaw/workspace/AGENTS.md
              [ -s /home/node/.openclaw/workspace/HEARTBEAT.md ] || printf '# Heartbeat\n\nInterval: 30m\nMonitor: channel status, error rate\n' > /home/node/.openclaw/workspace/HEARTBEAT.md
              [ -s /home/node/.openclaw/workspace/BOOTSTRAP.md ] || printf '# Bootstrap\n\nOn first run: verify API key, check channels, confirm cron jobs.\n' > /home/node/.openclaw/workspace/BOOTSTRAP.md
              echo '[init] Core workspace files bootstrapped'
              # Install default skills (only if not already present on PVC)
              SKILLS_DIR="/home/node/.openclaw/workspace/skills"
              mkdir -p "$SKILLS_DIR"
              if [ ! -d "$SKILLS_DIR/claude-skill-homeassistant" ]; then
                echo '[init] Installing default skill: homeassistant'
                git clone --depth 1 https://github.com/komal-SkyNET/claude-skill-homeassistant.git "$SKILLS_DIR/claude-skill-homeassistant" 2>/dev/null || true
              fi
              if [ ! -d "$SKILLS_DIR/odoo-manager" ]; then
                echo '[init] Installing default skill: odoo-manager'
                npx clawhub install odoo-manager --workdir /home/node/.openclaw/workspace --no-input 2>/dev/null || true
              fi
              if [ ! -d "$SKILLS_DIR/agent-browser-clawdbot" ]; then
                echo '[init] Installing default skill: agent-browser'
                npx clawhub install agent-browser-clawdbot --workdir /home/node/.openclaw/workspace --no-input 2>/dev/null || true
              fi
              # Install memory-lancedb-pro skill (knowledge file for AI agents)
              if [ ! -d "$SKILLS_DIR/memory-lancedb-pro-skill" ]; then
                echo '[init] Installing skill: memory-lancedb-pro-skill'
                git clone --depth 1 https://github.com/CortexReach/memory-lancedb-pro-skill.git "$SKILLS_DIR/memory-lancedb-pro-skill" 2>/dev/null || true
              fi
              # Install memory-lancedb-pro plugin
              if [ ! -d "/home/node/.openclaw/extensions/memory-lancedb-pro" ]; then
                echo '[init] Installing plugin: memory-lancedb-pro'
                openclaw plugins install memory-lancedb-pro@beta 2>/dev/null || true
                # Backup to PVC for next restart
                if [ -d "/home/node/.openclaw/extensions/memory-lancedb-pro" ]; then
                  cp -a /home/node/.openclaw/extensions/memory-lancedb-pro "$PVC/_extensions/"
                  echo '[init] memory-lancedb-pro installed and backed up to PVC'
                else
                  echo '[init] WARNING: memory-lancedb-pro install may have failed'
                fi
              else
                echo '[init] memory-lancedb-pro plugin ready (from PVC cache)'
              fi
              # Install openclaw-homeassistant plugin
              if [ ! -d "/home/node/.openclaw/extensions/openclaw-homeassistant" ]; then
                echo '[init] Installing plugin: openclaw-homeassistant'
                cd /tmp && npm pack @elvatis_com/openclaw-homeassistant 2>/dev/null
                mkdir -p /home/node/.openclaw/extensions/openclaw-homeassistant
                tar xzf /tmp/elvatis_com-openclaw-homeassistant-*.tgz -C /home/node/.openclaw/extensions/openclaw-homeassistant --strip-components=1 2>/dev/null
                rm -f /tmp/elvatis_com-openclaw-homeassistant-*.tgz
                if [ -f "/home/node/.openclaw/extensions/openclaw-homeassistant/package.json" ]; then
                  cp -a /home/node/.openclaw/extensions/openclaw-homeassistant "$PVC/_extensions/"
                  echo '[init] openclaw-homeassistant installed and backed up to PVC'
                else
                  echo '[init] WARNING: openclaw-homeassistant install may have failed'
                fi
              else
                echo '[init] openclaw-homeassistant plugin ready (from PVC cache)'
              fi
              # Install lossless-claw-enhanced plugin (DAG-based context management)
              if [ ! -d "/home/node/.openclaw/extensions/lossless-claw-enhanced" ]; then
                echo '[init] Installing plugin: lossless-claw-enhanced'
                cd /tmp && git clone --depth 1 https://github.com/win4r/lossless-claw-enhanced.git 2>/dev/null
                if [ -d /tmp/lossless-claw-enhanced ]; then
                  cd /tmp/lossless-claw-enhanced && npm install --production 2>/dev/null
                  cp -a /tmp/lossless-claw-enhanced /home/node/.openclaw/extensions/
                  cp -a /tmp/lossless-claw-enhanced "$PVC/_extensions/"
                  rm -rf /tmp/lossless-claw-enhanced
                  echo '[init] lossless-claw-enhanced installed and backed up to PVC'
                else
                  echo '[init] WARNING: lossless-claw-enhanced clone failed'
                fi
              else
                echo '[init] lossless-claw-enhanced plugin ready (from PVC cache)'
              fi
              # Inject plugins config into openclaw.json (after plugin is confirmed present)
              if [ -d "/home/node/.openclaw/extensions/memory-lancedb-pro" ]; then
                node -e "
                  const fs=require('fs'),p='$CONFIG_PVC';
                  const c=JSON.parse(fs.readFileSync(p,'utf8'));
                  if(!c.plugins||!c.plugins.entries){
                    c.plugins={
                      slots:{memory:'memory-lancedb-pro'},
                      entries:{'memory-lancedb-pro':{enabled:true,config:{
                        autoCapture:true,autoRecall:true,smartExtraction:true,
                        extractMinMessages:2,extractMaxChars:12000,
                        embedding:{provider:'openai-compatible',baseURL:'http://ollama-svc:11434/v1',model:'nomic-embed-text',apiKey:'ollama'},
                        llm:{baseURL:'http://ollama-svc:11434/v1',model:'llama3:8b',apiKey:'ollama'},
                        retrieval:{mode:'hybrid',vectorWeight:0.7,bm25Weight:0.3,minScore:0.2,hardMinScore:0.25,candidatePoolSize:50}
                      }}}
                    };
                    fs.writeFileSync(p,JSON.stringify(c,null,2));
                    console.log('[init] memory-lancedb-pro plugins config injected');
                  } else { console.log('[init] memory-lancedb-pro plugins config already present'); }
                " 2>/dev/null || true
              fi
              # Inject openclaw-homeassistant plugin config (uses HASS_SERVER + HASS_TOKEN env vars)
              if [ -d "/home/node/.openclaw/extensions/openclaw-homeassistant" ] && [ -n "${HASS_SERVER:-}" ] && [ -n "${HASS_TOKEN:-}" ]; then
                cat << 'HAEOF' | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{eval(d)})"
                  const fs=require('fs'),p=process.env.HOME+'/../mnt/openclaw-agents/_openclaw.json';
                  try {
                    const c=JSON.parse(fs.readFileSync('/mnt/openclaw-agents/_openclaw.json','utf8'));
                    if(!c.plugins) c.plugins={};
                    if(!c.plugins.entries) c.plugins.entries={};
                    if(!c.plugins.entries['openclaw-homeassistant']){
                      c.plugins.entries['openclaw-homeassistant']={enabled:true,config:{
                        url:process.env.HASS_SERVER,token:process.env.HASS_TOKEN,readOnly:false
                      }};
                      fs.writeFileSync('/mnt/openclaw-agents/_openclaw.json',JSON.stringify(c,null,2));
                      console.log('[init] openclaw-homeassistant plugin config injected');
                    } else { console.log('[init] openclaw-homeassistant plugin config already present'); }
                  } catch(e){ console.log('[init] WARNING: HA plugin config injection failed:',e.message); }
              HAEOF
              fi
              # Inject lossless-claw-enhanced plugin config
              if [ -d "/home/node/.openclaw/extensions/lossless-claw-enhanced" ]; then
                node -e "
                  const fs=require('fs'),p='/mnt/openclaw-agents/_openclaw.json';
                  const c=JSON.parse(fs.readFileSync(p,'utf8'));
                  if(!c.plugins) c.plugins={};
                  if(!c.plugins.entries) c.plugins.entries={};
                  if(!c.plugins.entries['lossless-claw']){
                    c.plugins.entries['lossless-claw']={enabled:true,config:{
                      contextThreshold:0.75,freshTailCount:4,incrementalMaxDepth:-1,
                      dbPath:'/home/node/.openclaw/memory/lcm.db'
                    }};
                    fs.writeFileSync(p,JSON.stringify(c,null,2));
                    console.log('[init] lossless-claw plugin config injected');
                  } else { console.log('[init] lossless-claw plugin config already present'); }
                " 2>/dev/null || true
              fi
              echo '[init] Default skills verified'
              rm -rf /home/node/.openclaw/devices/ 2>/dev/null || true
              # Auto-approve pending devices every 1 second (uses JSON to avoid multiline UUID issue)
              (sleep 10; while true; do
                openclaw devices list --json 2>/dev/null | node -e "
                  let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{
                    try{const j=JSON.parse(d);(j.pending||[]).forEach(p=>{if(p.requestId)console.log(p.requestId)})}catch(e){}
                  })
                " 2>/dev/null | while read req; do
                  openclaw devices approve "$req" 2>/dev/null && echo "[auto-approve] approved $req"
                done
                sleep 1
              done) &
              # Clean up legacy hass-cli venv (replaced by openclaw-homeassistant plugin)
              rm -rf /mnt/openclaw-agents/_tools 2>/dev/null
              mkdir -p /home/node/.local/bin
              export PATH="/home/node/.local/bin:$PATH"
              # Use container's own OpenClaw binary (NOT PVC runtime — prevents version conflicts)
              # The container image has /usr/local/bin/openclaw pinned to the correct version.
              # Previously PVC-cached runtime would auto-update to latest, causing Thinking-stuck bug.
              OC_BIN="/usr/local/bin/openclaw"
              # Safety: remove any stale PVC runtime to prevent version conflicts
              if [ -d "$PVC/_openclaw_runtime" ]; then
                echo "[init] WARNING: Removing stale PVC runtime to prevent version conflict"
                rm -rf "$PVC/_openclaw_runtime"
              fi
              echo "[init] OpenClaw ready: $($OC_BIN --version 2>/dev/null)"
              # Load skill env vars from workspace .env (persisted on PVC)
              if [ -f /home/node/.openclaw/workspace/.env ]; then
                set -a
                . /home/node/.openclaw/workspace/.env
                set +a
                echo '[init] Loaded skill env vars from workspace/.env'
              fi
              export PATH="/usr/local/bin:$PATH"
              # ── Fix 1: Ensure models allowlist for Nerve dropdown ──
              node -e "
                const fs=require('fs'),p='/mnt/openclaw-agents/_openclaw.json';
                const c=JSON.parse(fs.readFileSync(p,'utf8'));
                const model=c.agents?.defaults?.model||'minimax/MiniMax-M2.7';
                if(!c.agents.defaults.models||!c.agents.defaults.models[model]){
                  c.agents.defaults.models=c.agents.defaults.models||{};
                  c.agents.defaults.models[model]={alias:model.split('/').pop()+' (default)'};
                  fs.writeFileSync(p,JSON.stringify(c,null,2));
                  console.log('[init] Injected models allowlist for Nerve dropdown: '+model);
                }
              " 2>/dev/null || true
              # ── Fix 2: Symlink non-main agent workspaces to PVC ──
              # ── Fix 3: Auto-register agent dirs + bootstrap sessions ──
              cat << 'AGENTFIX' | node
              const fs=require('fs'),path=require('path');
              const PVC='/mnt/openclaw-agents';
              const HOME=process.env.HOME;
              const p=PVC+'/_openclaw.json';
              const c=JSON.parse(fs.readFileSync(p,'utf8'));

              // Fix 3a: Auto-register agent dirs into agents.list
              if(!Array.isArray(c.agents.list)) c.agents.list=[];
              const existingIds=new Set(c.agents.list.map(a=>a.id));
              const agentsDir=HOME+'/.openclaw/agents';
              try{
                const dirs=fs.readdirSync(agentsDir).filter(d=>{
                  if(d.startsWith('_')||d.startsWith('.'))return false;
                  return fs.existsSync(path.join(agentsDir,d,'agent'))||fs.existsSync(path.join(agentsDir,d,'sessions'));
                });
                let changed=false;
                for(const id of dirs){
                  if(existingIds.has(id))continue;
                  const entry={id};
                  if(id==='main'){entry.default=true;entry.workspace='~/.openclaw/workspace';}
                  else{entry.workspace='~/.openclaw/workspace-'+id;}
                  c.agents.list.push(entry);
                  changed=true;
                  console.log('[init] Auto-registered agent: '+id);
                }
                if(changed) fs.writeFileSync(p,JSON.stringify(c,null,2));
              }catch(e){console.log('[init] Agent registration error:',e.message)}

              // Fix 2: Symlink non-main workspaces to PVC
              const list=c.agents.list||[];
              for(const entry of list){
                const id=entry.id;
                if(!id||id==='main')continue;
                const ws=entry.workspace||('~/.openclaw/workspace-'+id);
                const resolved=ws.replace(/^~/,HOME);
                const pvcWs=path.join(PVC,'_workspace-'+id);
                if(!fs.existsSync(pvcWs)){
                  fs.mkdirSync(pvcWs,{recursive:true});
                  fs.mkdirSync(path.join(pvcWs,'memory'),{recursive:true});
                }
                try{
                  const stat=fs.lstatSync(resolved);
                  if(!stat.isSymbolicLink()){
                    const files=fs.readdirSync(resolved);
                    for(const f of files){
                      const src=path.join(resolved,f),dst=path.join(pvcWs,f);
                      if(!fs.existsSync(dst)) fs.renameSync(src,dst);
                    }
                    fs.rmdirSync(resolved);
                    fs.symlinkSync(pvcWs,resolved);
                    console.log('[init] Symlinked workspace-'+id+' to PVC');
                  }
                }catch(e){
                  try{
                    fs.mkdirSync(path.dirname(resolved),{recursive:true});
                    fs.symlinkSync(pvcWs,resolved);
                    console.log('[init] Created workspace-'+id+' symlink to PVC');
                  }catch(e2){}
                }
              }
              AGENTFIX
              # Bootstrap sessions (background, after gateway starts)
              (sleep 30; cat << 'SESSFIX' | node
              const fs=require('fs');
              const c=JSON.parse(fs.readFileSync('/mnt/openclaw-agents/_openclaw.json','utf8'));
              const list=Array.isArray(c.agents.list)?c.agents.list:[];
              for(const entry of list){
                const id=entry.id;
                if(!id)continue;
                const sessDir=process.env.HOME+'/.openclaw/agents/'+id+'/sessions';
                try{
                  fs.mkdirSync(sessDir,{recursive:true});
                  const files=fs.readdirSync(sessDir).filter(f=>f.endsWith('.json'));
                  if(files.length===0){
                    const key='kb-'+id+'-'+Date.now().toString(36);
                    const sess={key:key,agent:id,createdAt:Date.now(),label:id};
                    fs.writeFileSync(sessDir+'/'+key+'.json',JSON.stringify(sess));
                    console.log('[init] Bootstrap session for '+id+': '+key);
                  }
                }catch(e){}
              }
              SESSFIX
              ) &
              exec "$OC_BIN" gateway --bind lan --port 18789 --auth token --token "$OPENCLAW_GATEWAY_TOKEN" --allow-unconfigured
          ports:
            - containerPort: 18789
              name: gateway-http
          env:
            # Chromium / Puppeteer
            - name: CHROMIUM_FLAGS
              value: "--no-sandbox --disable-gpu --disable-dev-shm-usage"
            - name: PUPPETEER_CHROMIUM_REVISION
              value: "skip"
            - name: CHROME_PATH
              value: "/usr/bin/chromium"
            - name: PUPPETEER_EXECUTABLE_PATH
              value: "/usr/bin/chromium"
            # Ollama (local inference for memory-lancedb-pro)
            - name: OLLAMA_BASE_URL
              value: "http://ollama-svc:11434"
            - name: OLLAMA_API_BASE
              value: "http://ollama-svc:11434/v1"
            # Core secrets
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://openclaw:$(POSTGRES_PASSWORD)@openclaw-db-svc:5432/openclaw"
            # LLM Provider API Keys (all optional)
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: GEMINI_API_KEY
                  optional: true
            - name: MINIMAX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: MINIMAX_API_KEY
                  optional: true
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: DEEPSEEK_API_KEY
                  optional: true
            - name: QWEN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: QWEN_API_KEY
                  optional: true
            # Channel tokens (all optional)
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: TELEGRAM_BOT_TOKEN
                  optional: true
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: DISCORD_BOT_TOKEN
                  optional: true
            - name: LINE_CHANNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: LINE_CHANNEL_TOKEN
                  optional: true
            - name: LINE_CHANNEL_SECRET
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: LINE_CHANNEL_SECRET
                  optional: true
            # Skill env vars (HA, Odoo — stored in secret for all-process visibility)
            - name: HASS_SERVER
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: HASS_SERVER
                  optional: true
            - name: HASS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: HASS_TOKEN
                  optional: true
            - name: ODOO_URL
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: ODOO_URL
                  optional: true
            - name: ODOO_DB
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: ODOO_DB
                  optional: true
            - name: ODOO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: ODOO_USERNAME
                  optional: true
            - name: ODOO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: ODOO_PASSWORD
                  optional: true
            # GOG (Google Workspace CLI) keyring password
            - name: GOG_KEYRING_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: GOG_KEYRING_PASSWORD
                  optional: true
            # Nerve WebGUI public URL (for CORS allowedOrigins)
            - name: NERVE_PUBLIC_URL
              valueFrom:
                configMapKeyRef:
                  name: openclaw-config
                  key: NERVE_PUBLIC_URL
                  optional: true
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "12"
              memory: 12Gi
          readinessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 10
          volumeMounts:
            - name: agents-data
              mountPath: /mnt/openclaw-agents
            - name: dshm
              mountPath: /dev/shm
        # =============================================================
        # Nerve WebGUI - Sidecar Container
        # Shares PVC + pod network with gateway (localhost:18789)
        # Uses node:22-slim + PVC-cached build (no custom image needed)
        # =============================================================
        - name: nerve
          image: node:22.15-slim
          command:
            - sh
            - -c
            - |
              # Install git + build tools (needed for first build)
              apt-get update -qq && apt-get install -y -qq git make g++ python3 wget >/dev/null 2>&1
              # Setup: symlink PVC paths so Nerve can find workspace/agents data
              # Nerve runs as root in node:22-slim, so HOME=/root
              PVC="/mnt/openclaw-agents"
              NERVE_APP="$PVC/_nerve_app"
              mkdir -p /root/.openclaw
              ln -sfn "$PVC" /root/.openclaw/agents
              ln -sfn "$PVC/_workspace" /root/.openclaw/workspace
              ln -sfn "$PVC/_memory" /root/.openclaw/memory
              ln -sf "$PVC/_openclaw.json" /root/.openclaw/openclaw.json
              # Symlink non-main agent workspaces to PVC (Fix 2: enables memory panel in Nerve)
              for ws_dir in "$PVC"/_workspace-*/; do
                [ -d "$ws_dir" ] || continue
                agent_id=$(basename "$ws_dir" | sed 's/^_workspace-//')
                target="/root/.openclaw/workspace-$agent_id"
                if [ ! -e "$target" ]; then
                  ln -sfn "$ws_dir" "$target"
                  echo "[nerve-init] Symlinked workspace-$agent_id to PVC"
                fi
              done
              # Extensions dir: copy from PVC so openclaw CLI can validate plugins
              mkdir -p /root/.openclaw/extensions
              for plugin in memory-lancedb-pro openclaw-homeassistant lossless-claw-enhanced; do
                if [ -d "$PVC/_extensions/$plugin" ]; then
                  cp -a "$PVC/_extensions/$plugin" /root/.openclaw/extensions/
                fi
              done
              chown -R root:root /root/.openclaw/extensions/ 2>/dev/null || true
              ln -sfn "$PVC/_nerve" /root/.nerve
              # openclaw CLI: no longer used from PVC runtime (version conflict risk)
              # The gateway container has /usr/local/bin/openclaw but Nerve runs in a separate container
              # Nerve does not need the openclaw CLI directly
              # Install or restore Nerve from PVC cache
              if [ -f "$NERVE_APP/package.json" ] && [ -d "$NERVE_APP/dist" ]; then
                echo "[nerve-init] Nerve found on PVC cache — skipping build"
              else
                echo "[nerve-init] First boot: cloning and building Nerve..."
                rm -rf "$NERVE_APP"
                git clone --depth 1 https://github.com/daggerhashimoto/openclaw-nerve.git "$NERVE_APP"
                cd "$NERVE_APP"
                npm ci --loglevel=error 2>&1 | tail -5
                npm run build 2>&1 | tail -5
                echo "[nerve-init] Nerve build complete and cached on PVC"
              fi
              cd "$NERVE_APP"
              # Patch Nerve file serving for PVC symlink mounts
              # Problem: workspace is symlinked /root/.openclaw/workspace → /mnt/openclaw-agents/_workspace
              # Nerve's security checks resolve symlinks via fs.realpath() then reject paths
              # outside /root/.openclaw. Fix: add PVC mount to allowed prefixes and resolve root realpath.
              NERVE_FILES="$NERVE_APP/server/routes/files.ts"
              NERVE_UTILS="$NERVE_APP/server/lib/file-utils.ts"
              if ! grep -q '/mnt/openclaw-agents' "$NERVE_FILES" 2>/dev/null; then
                sed -i 's|return \[|return [\n    "/mnt/openclaw-agents",|' "$NERVE_FILES"
                echo '[nerve-init] Patched files.ts: added /mnt/openclaw-agents to allowed prefixes'
              fi
              if ! grep -q 'realRootPrefix' "$NERVE_UTILS" 2>/dev/null; then
                node -e "
                  const fs=require('fs');
                  const f=fs.readFileSync('$NERVE_UTILS','utf8');
                  const patched=f.replace(
                    /\/\/ Resolve symlinks and re-check[\s\S]*?return real;/,
                    '// Resolve symlinks and re-check (symlink-aware)\n  try {\n    const real = await fs.realpath(resolved);\n    let realRoot;\n    try { realRoot = await fs.realpath(root); } catch { realRoot = root; }\n    const realRootPrefix = realRoot.endsWith(path.sep) ? realRoot : realRoot + path.sep;\n    if (!real.startsWith(rootPrefix) && real !== root && !real.startsWith(realRootPrefix) && real !== realRoot) {\n      return null;\n    }\n    return real;'
                  );
                  fs.writeFileSync('$NERVE_UTILS',patched);
                  console.log('[nerve-init] Patched file-utils.ts');
                " 2>/dev/null
                cd "$NERVE_APP" && npm run build 2>&1 | tail -3
              fi
              # Write .env for Nerve (gateway on localhost = same pod)
              NERVE_ORIGIN="${NERVE_PUBLIC_URL:-https://localhost:3080}"
              printf 'GATEWAY_URL=http://127.0.0.1:18789\nGATEWAY_TOKEN=%s\nHOST=0.0.0.0\nPORT=3080\nNERVE_AUTH=true\nNERVE_PASSWORD_HASH=%s\nNERVE_SESSION_SECRET=%s\nNERVE_SESSION_TTL=2592000000\nTRUSTED_PROXIES=10.42.0.0/16\nSTT_PROVIDER=none\nALLOWED_ORIGINS=%s\nNERVE_PUBLIC_ORIGIN=%s\n' "$GATEWAY_TOKEN" "$NERVE_PASSWORD_HASH" "$NERVE_SESSION_SECRET" "$NERVE_ORIGIN" "$NERVE_ORIGIN" > .env
              # Wait for gateway to be ready on localhost:18789
              echo "[nerve-init] Waiting for gateway on localhost:18789..."
              RETRIES=0
              until wget -qO /dev/null http://127.0.0.1:18789/ 2>/dev/null || [ $RETRIES -ge 120 ]; do
                RETRIES=$((RETRIES + 1))
                sleep 2
              done
              if [ $RETRIES -ge 120 ]; then
                echo "[nerve-init] WARNING: Gateway not ready after 240s, starting anyway"
              else
                echo "[nerve-init] Gateway is ready!"
              fi
              # Start Nerve in production mode
              exec npm run prod
          ports:
            - containerPort: 3080
              name: nerve-http
          env:
            - name: OPENCLAW_BIN
              value: ""
            - name: GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: NERVE_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: NERVE_PASSWORD_HASH
                  optional: true
            - name: NERVE_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: NERVE_SESSION_SECRET
                  optional: true
            - name: NERVE_PUBLIC_URL
              valueFrom:
                configMapKeyRef:
                  name: openclaw-config
                  key: NERVE_PUBLIC_URL
                  optional: true
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /
              port: 3080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /
              port: 3080
            initialDelaySeconds: 180
            periodSeconds: 30
            failureThreshold: 5
          volumeMounts:
            - name: agents-data
              mountPath: /mnt/openclaw-agents
      volumes:
        - name: agents-data
          persistentVolumeClaim:
            claimName: openclaw-agents-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
---
# =============================================================
# OpenClaw Gateway - Service
# =============================================================
apiVersion: v1
kind: Service
metadata:
  name: openclaw-gateway-svc
  namespace: openclaw-tenant-1
  labels:
    app: openclaw-gateway
spec:
  selector:
    app: openclaw-gateway
  ports:
    - name: gateway-http
      protocol: TCP
      port: 18789
      targetPort: gateway-http
  type: ClusterIP
