# =============================================================
# OpenClaw Management Console — Browser-based TUI
#
# A structured management interface for OpenClaw, NOT a raw shell.
# Uses dialog(1) for menu-driven operations:
#   - Service status / health check
#   - Configuration management (openclaw.json, .env, SOUL.md)
#   - Model selection
#   - Plugin management
#   - Log viewer
#   - Enter container shell (escape hatch)
#   - Service restart
#
# Security: RBAC scoped to openclaw-gateway only.
#   Cannot control DB, cloudflared, ollama, or any other service.
#
# Access: https://cindytech1-tui.woowtech.io
# Auth: admin / <OPENCLAW_GATEWAY_TOKEN>
# =============================================================

# --- ServiceAccount ---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-web-tui-sa
  namespace: openclaw-tenant-1
  labels:
    app: openclaw-web-tui
    app.kubernetes.io/component: web-tui
---
# --- RBAC Role: scoped to openclaw-gateway only ---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openclaw-web-tui-exec
  namespace: openclaw-tenant-1
  labels:
    app: openclaw-web-tui
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["openclaw-gateway"]
    verbs: ["get", "patch"]
---
# --- RoleBinding ---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openclaw-web-tui-exec-binding
  namespace: openclaw-tenant-1
  labels:
    app: openclaw-web-tui
subjects:
  - kind: ServiceAccount
    name: openclaw-web-tui-sa
    namespace: openclaw-tenant-1
roleRef:
  kind: Role
  name: openclaw-web-tui-exec
  apiGroup: rbac.authorization.k8s.io
---
# --- ConfigMap: TUI management script ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-web-tui-scripts
  namespace: openclaw-tenant-1
  labels:
    app: openclaw-web-tui
data:
  tui.sh: |
    #!/bin/sh
    # =============================================================
    # OpenClaw Management Console TUI
    # dialog-based menu for managing the OpenClaw gateway service
    # =============================================================

    NS="openclaw-tenant-1"
    LABEL="app=openclaw-gateway"
    CTR="openclaw-gateway"
    DEPLOY="openclaw-gateway"
    BT="OpenClaw Management Console"
    TMPF="/tmp/tui_out"

    # --- Helpers ---

    get_pod() {
      kubectl get pod -l "$LABEL" -n "$NS" \
        --field-selector=status.phase=Running \
        -o jsonpath='{.items[0].metadata.name}' 2>/dev/null
    }

    check_pod() {
      POD=$(get_pod)
      if [ -z "$POD" ]; then
        dialog --backtitle "$BT" --title "Error" \
          --msgbox "OpenClaw gateway pod is not running.\n\nPlease wait for it to start." 8 50
        return 1
      fi
      return 0
    }

    # Non-interactive exec (capture output)
    kexec() {
      kubectl exec "$POD" -n "$NS" -c "$CTR" -- "$@" 2>/dev/null
    }

    # Interactive exec (full TTY — for vi, shell)
    kexec_it() {
      kubectl exec -it "$POD" -n "$NS" -c "$CTR" -- "$@"
    }

    # --- 1. Service Status ---

    show_status() {
      check_pod || return
      {
        echo "==============================="
        echo " Pod"
        echo "==============================="
        kubectl get pod -l "$LABEL" -n "$NS" -o wide 2>/dev/null
        echo ""
        echo "==============================="
        echo " Health Check"
        echo "==============================="
        local hp=$(kexec curl -s -o /dev/null -w "%{http_code}" http://localhost:18789/health)
        if [ "$hp" = "200" ]; then
          echo "Gateway HTTP: OK (200)"
        else
          echo "Gateway HTTP: $hp"
        fi
        echo ""
        echo "==============================="
        echo " Default Model"
        echo "==============================="
        kexec cat /home/node/.openclaw/openclaw.json 2>/dev/null \
          | jq -r '.agents.defaults.model // "not set"' 2>/dev/null \
          || echo "(unable to read)"
        echo ""
        echo "==============================="
        echo " Disk Usage (PVC)"
        echo "==============================="
        kexec df -h /mnt/openclaw-agents/ | head -2
        echo ""
        echo "==============================="
        echo " Uptime / Processes"
        echo "==============================="
        kexec ps -o pid,etime,comm | head -10
      } > $TMPF 2>&1
      dialog --backtitle "$BT" --title "Service Status" \
        --textbox $TMPF 24 78
    }

    # --- 2. Configuration Menu ---

    menu_config() {
      while true; do
        dialog --backtitle "$BT" --title "Configuration" \
          --cancel-label "Back" \
          --menu "" 16 60 8 \
          1 "View openclaw.json" \
          2 "Edit openclaw.json" \
          3 "View .env (skill variables)" \
          4 "Edit .env (skill variables)" \
          5 "Edit SOUL.md (AI persona)" \
          6 "Change default model" \
          7 "View channel settings" \
          2>$TMPF
        local choice=$(cat $TMPF)
        case "$choice" in
          1) view_config ;;
          2) edit_config ;;
          3) view_env ;;
          4) edit_env ;;
          5) edit_soul ;;
          6) change_model ;;
          7) view_channels ;;
          *) return ;;
        esac
      done
    }

    view_config() {
      check_pod || return
      kexec cat /home/node/.openclaw/openclaw.json \
        | jq '.' 2>/dev/null > $TMPF || echo "(unable to read)" > $TMPF
      dialog --backtitle "$BT" --title "openclaw.json" \
        --textbox $TMPF 24 78
    }

    edit_config() {
      check_pod || return
      clear
      echo "Opening vi editor for openclaw.json..."
      echo "Save and quit (:wq) to return to menu."
      echo ""
      sleep 1
      kexec_it vi /home/node/.openclaw/openclaw.json
    }

    view_env() {
      check_pod || return
      local content=$(kexec cat /home/node/.openclaw/workspace/.env 2>/dev/null)
      if [ -z "$content" ]; then
        dialog --backtitle "$BT" --title ".env" \
          --msgbox "File is empty or does not exist." 6 50
      else
        echo "$content" > $TMPF
        dialog --backtitle "$BT" --title "workspace/.env" \
          --textbox $TMPF 20 70
      fi
    }

    edit_env() {
      check_pod || return
      clear
      echo "Opening vi editor for workspace/.env..."
      echo "Save and quit (:wq) to return to menu."
      echo ""
      sleep 1
      kexec_it vi /home/node/.openclaw/workspace/.env
    }

    edit_soul() {
      check_pod || return
      clear
      echo "Opening vi editor for SOUL.md..."
      echo "Save and quit (:wq) to return to menu."
      echo ""
      sleep 1
      kexec_it vi /home/node/.openclaw/workspace/SOUL.md
    }

    change_model() {
      check_pod || return
      local current=$(kexec cat /home/node/.openclaw/openclaw.json \
        | jq -r '.agents.defaults.model // "unknown"' 2>/dev/null)

      dialog --backtitle "$BT" --title "Change Default Model" \
        --cancel-label "Cancel" \
        --radiolist "Current: $current\n\nSelect new model:" 18 60 8 \
        "minimax/MiniMax-M2.7"                 "MiniMax M2.7"        OFF \
        "openai/gpt-4o"                        "GPT-4o"              OFF \
        "anthropic/claude-sonnet-4-20250514"    "Claude Sonnet 4"     OFF \
        "deepseek/deepseek-chat"               "DeepSeek Chat"       OFF \
        "google/gemini-2.0-flash"              "Gemini 2.0 Flash"    OFF \
        "qwen/qwen-max"                        "Qwen Max"            OFF \
        2>$TMPF
      local new_model=$(cat $TMPF)
      [ -z "$new_model" ] && return

      dialog --backtitle "$BT" --title "Confirm" \
        --yesno "Change model from:\n  $current\nto:\n  $new_model\n\nProceed?" 10 55
      [ $? -ne 0 ] && return

      kexec node -e "
        const fs=require('fs'),p='/home/node/.openclaw/openclaw.json';
        const c=JSON.parse(fs.readFileSync(p,'utf8'));
        c.agents.defaults.model='$new_model';
        fs.writeFileSync(p,JSON.stringify(c,null,2));
        console.log('OK');
      " > $TMPF 2>&1

      if grep -q "OK" $TMPF; then
        dialog --backtitle "$BT" --title "Success" \
          --msgbox "Model changed to:\n  $new_model\n\nRestart the service for it to take effect." 9 55
      else
        dialog --backtitle "$BT" --title "Error" \
          --msgbox "Failed to update model.\n\n$(cat $TMPF)" 10 55
      fi
    }

    view_channels() {
      check_pod || return
      kexec cat /home/node/.openclaw/openclaw.json \
        | jq '.channels' 2>/dev/null > $TMPF || echo "(unable to read)" > $TMPF
      dialog --backtitle "$BT" --title "Channel Settings" \
        --textbox $TMPF 22 70
    }

    # --- 3. Plugin Management ---

    menu_plugins() {
      while true; do
        dialog --backtitle "$BT" --title "Plugin Management" \
          --cancel-label "Back" \
          --menu "" 12 55 4 \
          1 "List installed plugins" \
          2 "View plugin configurations" \
          3 "View memory/LanceDB status" \
          2>$TMPF
        local choice=$(cat $TMPF)
        case "$choice" in
          1) list_plugins ;;
          2) view_plugin_config ;;
          3) view_memory_status ;;
          *) return ;;
        esac
      done
    }

    list_plugins() {
      check_pod || return
      {
        echo "=== Installed Plugins ==="
        echo ""
        kexec ls -la /home/node/.openclaw/agents/_extensions/ 2>/dev/null \
          || echo "(no plugins found)"
        echo ""
        echo "=== Plugin Dirs ==="
        for d in $(kexec ls /home/node/.openclaw/agents/_extensions/ 2>/dev/null); do
          echo ""
          echo "--- $d ---"
          kexec ls /home/node/.openclaw/agents/_extensions/$d/ 2>/dev/null | head -5
        done
      } > $TMPF 2>&1
      dialog --backtitle "$BT" --title "Installed Plugins" \
        --textbox $TMPF 22 70
    }

    view_plugin_config() {
      check_pod || return
      kexec cat /home/node/.openclaw/openclaw.json \
        | jq '.plugins // "no plugins configured"' 2>/dev/null > $TMPF \
        || echo "(unable to read)" > $TMPF
      dialog --backtitle "$BT" --title "Plugin Configurations" \
        --textbox $TMPF 22 70
    }

    view_memory_status() {
      check_pod || return
      {
        echo "=== Memory Directory ==="
        kexec ls -lah /home/node/.openclaw/memory/ 2>/dev/null
        echo ""
        echo "=== LanceDB Size ==="
        kexec du -sh /home/node/.openclaw/memory/ 2>/dev/null
      } > $TMPF 2>&1
      dialog --backtitle "$BT" --title "Memory / LanceDB Status" \
        --textbox $TMPF 18 65
    }

    # --- 4. Cron Jobs ---

    view_cron() {
      check_pod || return
      {
        echo "=== Scheduled Jobs ==="
        echo ""
        kexec cat /home/node/.openclaw/cron/jobs.json 2>/dev/null \
          | jq '.' 2>/dev/null || echo "(no cron jobs found)"
      } > $TMPF 2>&1
      dialog --backtitle "$BT" --title "Cron / Scheduled Jobs" \
        --textbox $TMPF 22 70
    }

    # --- 5. View Logs ---

    view_logs() {
      check_pod || return
      dialog --backtitle "$BT" --title "Log Lines" \
        --cancel-label "Cancel" \
        --menu "How many lines?" 12 40 4 \
        50   "Last 50 lines" \
        100  "Last 100 lines" \
        200  "Last 200 lines" \
        500  "Last 500 lines" \
        2>$TMPF
      local lines=$(cat $TMPF)
      [ -z "$lines" ] && return
      kubectl logs "$POD" -n "$NS" -c "$CTR" --tail="$lines" > $TMPF 2>&1
      dialog --backtitle "$BT" --title "Gateway Logs (last $lines)" \
        --textbox $TMPF 24 100
    }

    # --- 6. Enter Shell ---

    enter_shell() {
      check_pod || return
      clear
      echo "============================================"
      echo " Entering OpenClaw gateway shell"
      echo " Type 'exit' to return to management menu"
      echo "============================================"
      echo ""
      kexec_it sh
      echo ""
      echo "Returning to menu..."
      sleep 1
    }

    # --- 7. Restart Service ---

    restart_service() {
      dialog --backtitle "$BT" --title "Restart Service" \
        --yesno "This will restart the OpenClaw gateway pod.\nAll active sessions will be disconnected.\n\nAre you sure?" 10 55
      [ $? -ne 0 ] && return

      kubectl rollout restart deployment/"$DEPLOY" -n "$NS" > $TMPF 2>&1
      if [ $? -eq 0 ]; then
        dialog --backtitle "$BT" --title "Restarting" \
          --infobox "Restart triggered. Pod is restarting...\n\nThis may take 1-2 minutes." 7 50
        sleep 3
      else
        dialog --backtitle "$BT" --title "Error" \
          --msgbox "Failed to restart:\n\n$(cat $TMPF)" 10 55
      fi
    }

    # --- 8. Initial Setup Wizard ---

    setup_wizard() {
      dialog --backtitle "$BT" --title "Initial Setup" \
        --yesno "This wizard will guide you through:\n\n  1. Select default AI model\n  2. Edit environment variables (.env)\n  3. Edit AI persona (SOUL.md)\n  4. Review channel settings\n\nContinue?" 14 55
      [ $? -ne 0 ] && return

      check_pod || return

      # Step 1: Model
      change_model

      # Step 2: .env
      dialog --backtitle "$BT" --title "Step 2/4: Environment Variables" \
        --yesno "Edit workspace/.env now?\n(API keys, service URLs, credentials)" 8 55
      [ $? -eq 0 ] && edit_env

      # Step 3: SOUL.md
      dialog --backtitle "$BT" --title "Step 3/4: AI Persona" \
        --yesno "Edit SOUL.md now?\n(AI personality, behavior rules)" 8 55
      [ $? -eq 0 ] && edit_soul

      # Step 4: Channels
      dialog --backtitle "$BT" --title "Step 4/4: Channels" \
        --yesno "Review channel settings now?\n(Telegram, LINE, WhatsApp)" 8 55
      [ $? -eq 0 ] && view_channels

      dialog --backtitle "$BT" --title "Setup Complete" \
        --yesno "Initial setup complete!\n\nRestart the service now to apply changes?" 9 55
      [ $? -eq 0 ] && restart_service
    }

    # --- Main Menu ---

    main_menu() {
      while true; do
        dialog --backtitle "$BT" \
          --title "OpenClaw Management Console" \
          --cancel-label "Exit" \
          --menu "Select an operation:" 20 58 10 \
          1 "Service Status" \
          2 "Initial Setup Wizard" \
          3 "Configuration" \
          4 "Plugin Management" \
          5 "Cron / Scheduled Jobs" \
          6 "View Logs" \
          7 "Enter Shell" \
          8 "Restart Service" \
          2>$TMPF
        local choice=$(cat $TMPF)
        case "$choice" in
          1) show_status ;;
          2) setup_wizard ;;
          3) menu_config ;;
          4) menu_plugins ;;
          5) view_cron ;;
          6) view_logs ;;
          7) enter_shell ;;
          8) restart_service ;;
          *) break ;;
        esac
      done

      clear
      echo "OpenClaw Management Console closed."
      echo "Refresh browser to reconnect."
      sleep 3
    }

    # --- Entry Point ---
    main_menu
---
# --- Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-web-tui
  namespace: openclaw-tenant-1
  labels:
    app: openclaw-web-tui
    app.kubernetes.io/component: web-tui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw-web-tui
  template:
    metadata:
      labels:
        app: openclaw-web-tui
    spec:
      serviceAccountName: openclaw-web-tui-sa
      containers:
        - name: web-tui
          image: alpine:3.21
          command:
            - sh
            - -c
            - |
              set -e
              echo '[web-tui] Installing packages...'
              apk add --no-cache ttyd curl dialog jq
              KUBECTL_VER=$(curl -Ls https://dl.k8s.io/release/stable.txt)
              curl -Lo /usr/local/bin/kubectl \
                "https://dl.k8s.io/release/${KUBECTL_VER}/bin/linux/amd64/kubectl"
              chmod +x /usr/local/bin/kubectl
              echo "[web-tui] kubectl ${KUBECTL_VER} ready"
              echo '[web-tui] Starting management console on :7681'
              exec ttyd -p 7681 -c "admin:${TUI_PASSWORD}" -W \
                /scripts/tui.sh
          ports:
            - containerPort: 7681
              name: ttyd
          env:
            - name: TUI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 7681
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 7681
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: scripts
          configMap:
            name: openclaw-web-tui-scripts
            defaultMode: 0755
---
# --- Service ---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-web-tui-svc
  namespace: openclaw-tenant-1
  labels:
    app: openclaw-web-tui
spec:
  selector:
    app: openclaw-web-tui
  ports:
    - protocol: TCP
      port: 7681
      targetPort: 7681
      name: ttyd
  type: ClusterIP
