apiVersion: apps/v1
kind: Deployment
metadata:
  name: setup-wizard
  namespace: openclaw-tenant-1
  labels:
    app: setup-wizard
    app.kubernetes.io/component: setup-wizard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: setup-wizard
  template:
    metadata:
      labels:
        app: setup-wizard
    spec:
      serviceAccountName: wizard-sa
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: setup-wizard
          image: openclaw-setup-wizard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18790
          envFrom:
            - configMapRef:
                name: cf-config
            - secretRef:
                name: cf-secrets
          env:
            - name: NAMESPACE
              value: "openclaw-tenant-1"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: setup-wizard-svc
  namespace: openclaw-tenant-1
  labels:
    app: setup-wizard
spec:
  selector:
    app: setup-wizard
  ports:
    - protocol: TCP
      port: 18790
      targetPort: 18790
  type: ClusterIP
