<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- Kitchen Display Monitor — Odoo portal icon style -->
<!-- Monitor body -->
<rect x="6" y="10" width="52" height="34" rx="3" fill="#C1DBF6"/>
<rect x="6" y="10" width="52" height="34" rx="3" stroke="#374874" stroke-width="1" fill="none"/>
<!-- Screen -->
<rect x="10" y="14" width="44" height="26" rx="2" fill="white" stroke="#374874" stroke-width="0.6"/>
<!-- Order ticket 1 — done (peach with check) -->
<rect x="13" y="17" width="18" height="9" rx="1.5" fill="#FBDBD0" stroke="#374874" stroke-width="0.6"/>
<line x1="16" y1="20.5" x2="24" y2="20.5" stroke="#374874" stroke-width="0.8" stroke-linecap="round"/>
<line x1="16" y1="23" x2="21" y2="23" stroke="#374874" stroke-width="0.6" stroke-linecap="round" opacity="0.5"/>
<path d="M27 19.5 L28.2 21 L30 18.5" stroke="#374874" stroke-width="0.9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
<!-- Order ticket 2 — in progress (blue) -->
<rect x="34" y="17" width="17" height="9" rx="1.5" fill="#C1DBF6" stroke="#374874" stroke-width="0.6"/>
<line x1="37" y1="20.5" x2="44" y2="20.5" stroke="#374874" stroke-width="0.8" stroke-linecap="round"/>
<line x1="37" y1="23" x2="42" y2="23" stroke="#374874" stroke-width="0.6" stroke-linecap="round" opacity="0.5"/>
<!-- Order ticket 3 — waiting (outline) -->
<rect x="13" y="29" width="18" height="9" rx="1.5" fill="none" stroke="#374874" stroke-width="0.6" stroke-dasharray="2 1.5"/>
<line x1="16" y1="32.5" x2="24" y2="32.5" stroke="#C1DBF6" stroke-width="0.8" stroke-linecap="round"/>
<!-- Order ticket 4 — waiting -->
<rect x="34" y="29" width="17" height="9" rx="1.5" fill="none" stroke="#374874" stroke-width="0.6" stroke-dasharray="2 1.5"/>
<line x1="37" y1="32.5" x2="44" y2="32.5" stroke="#C1DBF6" stroke-width="0.8" stroke-linecap="round"/>
<!-- Stand -->
<path d="M27 44 L27 50 L22 54 L42 54 L37 50 L37 44" fill="#C1DBF6" stroke="#374874" stroke-width="1" stroke-linejoin="round"/>
<!-- Bell notification badge -->
<circle cx="54" cy="12" r="5.5" fill="#FBDBD0" stroke="#374874" stroke-width="0.8"/>
<path d="M52.5 11.5 C52.5 10 53.2 9 54 9 C54.8 9 55.5 10 55.5 11.5 L55.5 12.5 L52.5 12.5 Z" stroke="#374874" stroke-width="0.7" fill="none"/>
<line x1="52" y1="12.5" x2="56" y2="12.5" stroke="#374874" stroke-width="0.7" stroke-linecap="round"/>
<circle cx="54" cy="13.8" r="0.5" fill="#374874"/>
</svg>
