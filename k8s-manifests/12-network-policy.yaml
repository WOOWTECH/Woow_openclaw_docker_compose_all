# =============================================================
# NetworkPolicy — Restrict pod-to-pod communication
# Only allow necessary traffic between components
# =============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openclaw-db-policy
  namespace: openclaw-tenant-1
spec:
  podSelector:
    matchLabels:
      app: openclaw-db
  policyTypes:
    - Ingress
  ingress:
    # Only gateway can access the database
    - from:
        - podSelector:
            matchLabels:
              app: openclaw-gateway
      ports:
        - port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ollama-policy
  namespace: openclaw-tenant-1
spec:
  podSelector:
    matchLabels:
      app: ollama
  policyTypes:
    - Ingress
  ingress:
    # Only gateway can access Ollama
    - from:
        - podSelector:
            matchLabels:
              app: openclaw-gateway
      ports:
        - port: 11434
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gateway-policy
  namespace: openclaw-tenant-1
spec:
  podSelector:
    matchLabels:
      app: openclaw-gateway
  policyTypes:
    - Ingress
  ingress:
    # Cloudflared tunnel can access gateway and nerve
    - from:
        - podSelector:
            matchLabels:
              app: cloudflared
      ports:
        - port: 18789
        - port: 3080
    # Allow internal cluster traffic (for Telegram webhook etc)
    - from:
        - namespaceSelector: {}
      ports:
        - port: 18789
        - port: 3080
